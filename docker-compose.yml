services:
  app:
    build: .
    ports:
      - "${VMANGE_HTTP_PORT:-8080}:80"
    environment:
      VBOX_BASE_URL: "${VBOX_BASE_URL:-http://localhost:8080}"
      VBOX_FORCE_HTTPS: "${VBOX_FORCE_HTTPS:-0}"
      VBOX_DB_HOST: db
      VBOX_DB_NAME: "${VBOX_DB_NAME:-vmange}"
      VBOX_DB_USER: "${VBOX_DB_USER:-vmange}"
      VBOX_DB_PASS: "${VBOX_DB_PASS:-change-me}"
      VBOX_AGENT_TOKEN: "${VBOX_AGENT_TOKEN:-change-me}"
      VBOX_SETUP_TOKEN: "${VBOX_SETUP_TOKEN:-change-me-too}"
      VBOX_MAIL_FROM: "${VBOX_MAIL_FROM:-}"
      VBOX_SMTP_HOST: "${VBOX_SMTP_HOST:-}"
      VBOX_SMTP_PORT: "${VBOX_SMTP_PORT:-587}"
      VBOX_SMTP_USERNAME: "${VBOX_SMTP_USERNAME:-}"
      VBOX_SMTP_PASSWORD: "${VBOX_SMTP_PASSWORD:-}"
      VBOX_SMTP_ENCRYPTION: "${VBOX_SMTP_ENCRYPTION:-tls}"
      VBOX_IMAP_HOST: "${VBOX_IMAP_HOST:-}"
      VBOX_IMAP_PORT: "${VBOX_IMAP_PORT:-993}"
      VBOX_IMAP_USERNAME: "${VBOX_IMAP_USERNAME:-}"
      VBOX_IMAP_PASSWORD: "${VBOX_IMAP_PASSWORD:-}"
      VBOX_IMAP_ENCRYPTION: "${VBOX_IMAP_ENCRYPTION:-ssl}"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      - db

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: "${VBOX_DB_NAME:-vmange}"
      MARIADB_USER: "${VBOX_DB_USER:-vmange}"
      MARIADB_PASSWORD: "${VBOX_DB_PASS:-change-me}"
      MARIADB_ROOT_PASSWORD: "${VBOX_DB_ROOT_PASS:-change-root}"
    volumes:
      - vmange-db:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  vmange-db:
